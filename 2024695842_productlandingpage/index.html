<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Landing Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header id="header">
    <img
      id="header-img"
      src="https://cdn.freecodecamp.org/testable-projects-fcc/images/product-landing-page-logo.png"
      alt="Product Logo"
    >

    <nav id="nav-bar">
      <a class="nav-link" href="#features">Features</a>
      <a class="nav-link" href="#video-section">Video</a>
      <a class="nav-link" href="#pricing">Pricing</a>
    </nav>
  </header>

  <main>

    <section id="hero">
      <h1>Premium Headphones</h1>
      <p>Experience amazing sound quality.</p>

      <form
        id="form"
        action="https://www.freecodecamp.org/email-submit"
      >
        <input
          id="email"
          type="email"
          name="email"
          placeholder="Enter your email address"
          required
        >

        <input
          id="submit"
          type="submit"
          value="Get Started"
        >
      </form>
    </section>

    <section id="features">
      <h2>Features</h2>

      <div class="feature">
        <h3>Premium Sound</h3>
        <p>Crystal clear audio experience.</p>
      </div>

      <div class="feature">
        <h3>Wireless</h3>
        <p>Enjoy complete freedom.</p>
      </div>

      <div class="feature">
        <h3>Long Battery Life</h3>
        <p>Up to 40 hours of listening.</p>
      </div>
    </section>

    <section id="video-section">
      <h2>Product Video</h2>

      <iframe
        id="video"
        width="560"
        height="315"
        src="https://www.youtube.com/embed/y8Yv4pnO7qc"
        title="Product Video"
        allowfullscreen>
      </iframe>
    </section>

    <section id="pricing">
      <h2>Pricing</h2>

      <div class="price-container">
        <div class="card">
          <h3>Basic</h3>
          <p>RM99</p>
        </div>

        <div class="card">
          <h3>Premium</h3>
          <p>RM199</p>
        </div>

        <div class="card">
          <h3>Ultimate</h3>
          <p>RM299</p>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
